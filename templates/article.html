<!doctype html><html lang="{{lang}}" dir="{{dir}}"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}} — RYLIST</title>
<meta name="description" content="{{desc}}">
<link rel="canonical" href="{{canonical}}">{{hreflang}}
<link rel="stylesheet" href="{{assets}}/assets/css/styles.css">
{{themeHead}}
</head><body>
<main class="container pdetail adetail">
  <a class="pdetail__back" href="{{newsHref}}">← RYLIST</a>
  {{hero}}
  <header class="pdetail__head adetail__head">
    <div class="adetail__meta"><span class="article-card__cat">{{cat}}</span><span class="article-card__date">{{date}}</span></div>
    <h1>{{title}}</h1>
    {{lead}}
  </header>
  <div class="pdetail__desc adetail__body">{{body}}</div>
  <div class="btn-row"><a class="btn btn--primary" href="{{newsHref}}">{{backCta}}</a></div>
</main>
<script type="module" src="{{assets}}/assets/js/fahem.js"></script>
</body></html>
